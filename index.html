<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Workflow Mind Map</title>
    <style>
      .recovery-screen {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #1e1e2e;
        color: #fff;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding: 2rem;
        text-align: center;
      }
      .recovery-screen h1 { font-size: 1.5rem; margin-bottom: 1rem; }
      .recovery-screen p { color: #94a3b8; margin-bottom: 1.5rem; max-width: 400px; font-size: 0.875rem; }
      .recovery-screen button {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.875rem;
        margin: 0.375rem;
      }
      .recovery-screen .btn-primary { background: #6366f1; color: #fff; }
      .recovery-screen .btn-secondary { background: transparent; color: #94a3b8; border: 1px solid #334155; }
    </style>
    <script>
      // Pre-React recovery: handle ?reset=1 URL param
      (function() {
        if (window.location.search.includes('reset=1')) {
          localStorage.clear();
          window.location.href = window.location.pathname;
          return;
        }
        // Show recovery UI if app doesn't hide it within 8 seconds
        window.__appLoaded = false;
        setTimeout(function() {
          if (!window.__appLoaded) {
            var el = document.getElementById('recovery-screen');
            if (el) el.style.display = 'flex';
          }
        }, 8000);
      })();
    </script>
  </head>
  <body>
    <div id="recovery-screen" class="recovery-screen">
      <h1>App failed to load</h1>
      <p>The app encountered an error during startup. This is usually caused by corrupted local data.</p>
      <button class="btn-primary" onclick="localStorage.clear(); window.location.reload();">Clear Data &amp; Reload</button>
      <button class="btn-secondary" onclick="window.location.reload();">Just Reload</button>
      <button class="btn-secondary" onclick="window.location.href=window.location.pathname+'?reset=1';">Force Reset (URL)</button>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
